<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Sofra — Sign Up</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <a href="../HomePage/Home.html" class="navbar-brand">El Sofra</a>
    <ul class="navbar-links">
      <li><a href="../HomePage/Home.html">Home</a></li>
      <li><a href="../RecipesList/ListOfRecipes.html">Recipes</a></li>
      <li><a href="../Favourites/Favourites.html">Favourites</a></li>
      <li><a href="../ProfilePage/Profile.html">Profile</a></li>
    </ul>
    <div class="navbar-auth">
      <a href="../LogInPage/index.html">Log In</a>
      <a href="../SignUpPage/Sign up.html" class="signup-btn active-link">Sign Up</a>
    </div>
  </nav>

  <main class="auth-page">

    <div class="auth-wrap">

      <!-- Left decorative panel -->
      <div class="auth-panel">
        <div class="panel-ornament">&#10022;</div>
        <h1 class="panel-brand">El Sofra</h1>
        <p class="panel-sub">Egyptian Kitchen</p>
        <div class="panel-line"></div>
        <p class="panel-msg">Already have<br>an account?<br>Sign in below.</p>
        <a href="../LogInPage/index.html" class="panel-btn">Sign in</a>
      </div>

      <!-- Right form panel -->
      <div class="auth-form-side">

        <div class="toast" id="toast"></div>

        <h2 class="form-title">Join the table</h2>
        <p class="form-sub">Create your free account</p>

        <!-- Role selector -->
        <div class="role-row">
          <div class="role-pill active" id="roleUser" onclick="pickRole('user')">User</div>
          <div class="role-pill" id="roleAdmin" onclick="pickRole('admin')">Admin</div>
        </div>

        <form onsubmit="handleSignup(event)">

          <div class="row-two">
            <div class="fg">
              <label for="sFirst">First name</label>
              <input type="text" id="sFirst" name="firstname" placeholder="Ahmed" required minlength="2">
            </div>
            <div class="fg">
              <label for="sLast">Last name</label>
              <input type="text" id="sLast" name="lastname" placeholder="Hassan" required minlength="2">
            </div>
          </div>

          <div class="fg">
            <label for="sEmail">Email</label>
            <input type="email" id="sEmail" name="email" placeholder="your@email.com" required>
          </div>

          <div class="fg">
            <label for="sPass">Password</label>
            <div class="input-wrap">
              <input type="password" id="sPass" name="password" placeholder="Min. 8 characters" required minlength="8" oninput="checkStrength(this.value)">
              <button type="button" class="eye-btn" onclick="togglePass('sPass', this)" aria-label="Toggle password visibility">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <div class="strength-bar">
              <span id="b1"></span>
              <span id="b2"></span>
              <span id="b3"></span>
              <span id="b4"></span>
            </div>
            <div class="strength-label" id="strengthLabel"></div>
          </div>

          <div class="fg">
            <label for="sConf">Confirm password</label>
            <div class="input-wrap">
              <input type="password" id="sConf" name="confirm" placeholder="Re-enter your password" required>
              <button type="button" class="eye-btn" onclick="togglePass('sConf', this)" aria-label="Toggle confirm password visibility">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <label class="check-label terms-label">
            <input type="checkbox" id="terms" required>
            I agree to the <a href="#">terms &amp; conditions</a>
          </label>

          <button type="submit" class="submit-btn">Create Account</button>

        </form>

        <p class="switch-text">Already have an account? <a href="../LogInPage/index.html">Sign in</a></p>

      </div>
    </div>

  </main>

  <script src="signUp.js"></script>

</body>
</html>
